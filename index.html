<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Speecho</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="hud">
      <section class="frame">
        <header class="titleRow">
          <p class="eyebrow">SPEECH RECOGNITION</p>
          <h1>speecho</h1>
        </header>

        <section class="centerStage">
          <div class="ring ringA" aria-hidden="true"></div>
          <div class="ring ringB" aria-hidden="true"></div>
          <div class="ring ringC" aria-hidden="true"></div>

          <button id="micBtn" class="micBtn" type="button" aria-label="Toggle microphone">
            <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
              <path d="M12 15a4 4 0 0 0 4-4V7a4 4 0 1 0-8 0v4a4 4 0 0 0 4 4Zm6-4a1 1 0 1 0-2 0 4 4 0 0 1-8 0 1 1 0 0 0-2 0 6 6 0 0 0 5 5.91V20H9a1 1 0 1 0 0 2h6a1 1 0 1 0 0-2h-2v-3.09A6 6 0 0 0 18 11Z"/>
            </svg>
          </button>
        </section>

        <section class="wavePanel" aria-hidden="true">
          <div id="waveBars" class="waveBars"></div>
        </section>

        <p id="liveState" class="liveState">MIC OFF - CLICK THE MIC TO START</p>

        <section class="controls">
          <label for="language">Language</label>
          <select id="language" aria-label="Language">
            <option value="en-US">English (US)</option>
            <option value="en-IN">English (India)</option>
            <option value="hi-IN">Hindi (India)</option>
          </select>
          <button id="clearBtn" type="button">Clear Text</button>
        </section>

        <section class="transcript">
          <p id="interim" class="interim">...</p>
          <pre id="output" class="output">No speech captured yet.</pre>
        </section>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
